on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    runs-on: ${{ matrix.os }}

    # Platforms to build on/for
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        node-version: [24.14.0]

    steps:
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Check out Git repository
        uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
        # install dbus-1 dep for xosms
      - if: matrix.os == 'ubuntu-latest'
        name: update apt and install utils
        run: |
          sudo apt update
          sudo apt install libdbus-1-dev elfutils
      - if: matrix.os == 'ubuntu-latest'
        name: install ubuntu snap
        continue-on-error: true
        run: |
          sudo apt install snapd
          sudo snap install snapcraft --classic

      - if: matrix.os == 'ubuntu-latest'
        name: install ubuntu flatpak
        continue-on-error: true
        run: |
          sudo apt install flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - if: matrix.os == 'windows-latest'
        name: install windows deps
        uses: GuillaumeFalourd/setup-windows10-sdk-action@v2.4
        with:
          sdk-version: 19041

      - if: github.ref_type == 'tag'
        id: getVersion
        uses: actions/github-script@v7.0.1
        env:
          REF_NAME: ${{ github.ref_name }}
        with:
          script: |
            const isVersion = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$/
            const id = process.env.REF_NAME && process.env.REF_NAME.split('v')[1] || process.env.REF_NAME
            const isRC = id.includes('-rc.')
            core.setOutput("value", id);
            core.setOutput("ok", isVersion.test(id))
            core.setOutput("releaseType", isRC ? 'rc' : 'stable')
      - if: github.ref_type == 'tag' && steps.getVersion.outputs.ok
        name: set app version
        uses: jossef/action-set-json-field@v2.2
        with:
          file: package.json
          field: version
          value: ${{ steps.getVersion.outputs.value }}
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
      - if: matrix.os == 'macos-latest'
        name: Setup Apple keychain
        run: |
          mkdir -p .secrets
          echo "${{ secrets.APPLE_API_KEY }}" > ${{ github.workspace }}/.secrets/AuthKey.p8
          chmod 600 ${{ github.workspace }}/.secrets/AuthKey.p8

          export APPLE_API_KEYCHAIN_PROFILE=ytmdesktop-keychain
          export APPLE_API_KEY=${{ github.workspace }}/.secrets/AuthKey.p8
          export APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}
          export APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}
          export CSC_LINK=${{ secrets.CSC_LINK }}
          export CSC_KEY_PASSWORD=${{ secrets.CSC_KEY_PASSWORD }}
          export KEYCHAIN_PASSWORD=actions

          echo "APPLE_API_KEYCHAIN_PROFILE=$APPLE_API_KEYCHAIN_PROFILE" >> $GITHUB_ENV
          echo "APPLE_API_KEY=$APPLE_API_KEY" >> $GITHUB_ENV
          echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID" >> $GITHUB_ENV
          echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> $GITHUB_ENV
          echo "CSC_LINK=$CSC_LINK" >> $GITHUB_ENV
          echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

          echo "${{ secrets.CSC_LINK }}" | base64 --decode > ${{ github.workspace }}/.secrets/csc.p12

          security create-keychain -p $KEYCHAIN_PASSWORD build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p $KEYCHAIN_PASSWORD build.keychain
          security set-keychain-settings build.keychain
          security import ${{ github.workspace }}/.secrets/csc.p12 -k build.keychain -P $CSC_KEY_PASSWORD -T /usr/bin/codesign &> /dev/null
          security set-key-partition-list -S apple-tool:,apple: -s -k $KEYCHAIN_PASSWORD build.keychain &> /dev/null
          
          xcrun notarytool store-credentials $APPLE_API_KEYCHAIN_PROFILE --key "$APPLE_API_KEY" --key-id $APPLE_API_KEY_ID --issuer $APPLE_API_ISSUER
      - name: Build Electron release
        run: pnpm release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          VITE_LASTFM_API: ${{ secrets.LASTFM_API }}
          VITE_LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
          VITE_GITHUB_REPOSITORY: ${{ github.repository }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ env.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
          CSC_LINK: ${{ env.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ env.CSC_KEY_PASSWORD }}
      - if: matrix.os == 'macos-latest'
        name: Cleanup certificates and keys
        run: |
          rm -rf .secrets
      - if: matrix.os == 'ubuntu-latest'
        name: Upload release source maps to sentry
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_PROJECT: ytmdesktop
          SENTRY_ORG: venipa.net
          SENTRY_DEPLOY_ENVIRONMENT: production
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
        run: |
          # Install Sentry CLI
          curl -sL https://sentry.io/get-cli/ | bash

          # Create new Sentry release
          export SENTRY_RELEASE=$(sentry-cli releases propose-version)
          sentry-cli releases new --project $SENTRY_PROJECT $SENTRY_RELEASE
          sentry-cli releases set-commits --auto $SENTRY_RELEASE
          sentry-cli releases finalize $SENTRY_RELEASE

          # Create new deploy for this Sentry release
          sentry-cli releases deploys $SENTRY_RELEASE new -e $SENTRY_DEPLOY_ENVIRONMENT

    #   - if: matrix.os == 'windows-latest' && steps.getVersion.outputs.releaseType == 'stable'
